<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/auth-gate.js?v=20260224-2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing | MSFG Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">

  <style>
    /* ---- Reset & Base ---- */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1a1a2e;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-family: 'Poppins', 'Inter', sans-serif; font-weight: 600; margin: 0; }
    a { color: #2d6a4f; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ---- Layout ---- */
    .proc-layout { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }

    /* ---- Sidebar ---- */
    .proc-sidebar {
      background: #104547;
      padding: 1.25rem 0;
      display: flex;
      flex-direction: column;
    }
    .proc-sidebar__brand {
      padding: 0 1.25rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 0.75rem;
    }
    .proc-sidebar__brand h2 {
      color: #fff;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .proc-sidebar__brand h2 i { opacity: 0.7; }
    .proc-sidebar__nav { display: flex; flex-direction: column; gap: 2px; padding: 0 0.5rem; }
    .proc-sidebar__link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      transition: all 0.15s ease;
    }
    .proc-sidebar__link:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .proc-sidebar__link.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }
    .proc-sidebar__link i { width: 18px; text-align: center; font-size: 0.8rem; }
    .proc-sidebar__back {
      margin-top: auto;
      padding: 1rem 1.25rem 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .proc-sidebar__back a {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .proc-sidebar__back a:hover { color: #fff; }

    /* ---- Main ---- */
    .proc-main { padding: 1.5rem 2rem; overflow-y: auto; }

    /* ---- Header ---- */
    .proc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .proc-header h1 { font-size: 1.35rem; display: flex; align-items: center; gap: 0.5rem; }
    .proc-header__desc { color: #6c757d; font-size: 0.88rem; margin: 0.25rem 0 0; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: all 0.15s ease; white-space: nowrap; }
    .btn-primary { background: #104547; color: #fff; }
    .btn-primary:hover { background: #0d3a3c; box-shadow: 0 2px 8px rgba(16,69,71,0.3); }
    .btn-secondary { background: #e8ecf1; color: #4a4a68; }
    .btn-secondary:hover { background: #dde1e8; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* ---- Toolbar ---- */
    .proc-toolbar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .proc-search { flex: 1; min-width: 240px; position: relative; }
    .proc-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #8888a4; pointer-events: none; font-size: 0.85rem; }
    .proc-search input {
      width: 100%; padding: 0.5rem 0.75rem 0.5rem 34px; border: 1.5px solid #e0e4ea; border-radius: 6px;
      font-size: 0.88rem; font-family: inherit; color: #1a1a2e; background: #fff; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .proc-search input:focus { outline: none; border-color: #2d6a4f; box-shadow: 0 0 0 3px rgba(45,106,79,0.12); }
    .proc-filter-select {
      padding: 0.45rem 0.75rem; border: 1.5px solid #e0e4ea; border-radius: 6px; font-size: 0.83rem;
      font-family: inherit; color: #4a4a68; background: #fff; cursor: pointer;
    }
    .proc-filter-select:focus { outline: none; border-color: #2d6a4f; }

    /* ---- Table ---- */
    .proc-results { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .proc-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .proc-table thead { background: #f5f7fa; border-bottom: 2px solid #e0e4ea; }
    .proc-table th { text-align: left; padding: 0.6rem 1rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #8888a4; white-space: nowrap; }
    .proc-table td { padding: 0.6rem 1rem; border-bottom: 1px solid #f0f2f5; color: #4a4a68; vertical-align: middle; }
    .proc-table tbody tr { transition: background 0.12s; cursor: pointer; }
    .proc-table tbody tr:hover { background: #f8f9fb; }
    .proc-table tbody tr:last-child td { border-bottom: none; }
    .proc-table td:first-child { font-weight: 600; color: #1a1a2e; }

    /* ---- Status badges ---- */
    .proc-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .proc-status--ordered   { background: #e3f2fd; color: #1565c0; }
    .proc-status--received  { background: #e8f5e9; color: #2e7d32; }
    .proc-status--pending   { background: #fff3e0; color: #e65100; }
    .proc-status--in-review { background: #f3e5f5; color: #7b1fa2; }
    .proc-status--complete  { background: #e8f5e9; color: #1b5e20; }
    .proc-status--issue     { background: #ffebee; color: #c62828; }

    /* ---- Row actions ---- */
    .proc-row-actions { display: flex; gap: 2px; justify-content: flex-end; }
    .proc-row-action { padding: 5px; color: #8888a4; border-radius: 4px; transition: all 0.12s; }
    .proc-row-action:hover { background: #f0f2f5; color: #104547; }
    .proc-delete-btn:hover { color: #ef4444; }

    /* ---- Empty / loading ---- */
    .proc-empty { text-align: center; padding: 3rem 1.5rem; color: #8888a4; }
    .proc-empty i { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.35; display: block; }
    .proc-empty h3 { color: #4a4a68; margin-bottom: 0.25rem; font-size: 1rem; }
    .proc-empty p { font-size: 0.88rem; margin: 0; }
    .proc-loading { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 3rem; color: #8888a4; font-size: 0.88rem; }
    .proc-spinner { width: 18px; height: 18px; border: 2.5px solid #e0e4ea; border-top-color: #104547; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Pagination ---- */
    .proc-pagination { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-top: 1rem; }
    .proc-pagination__info { font-size: 0.82rem; color: #8888a4; }

    /* ---- Modal ---- */
    .proc-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1.5rem; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .proc-modal { background: #fff; border-radius: 12px; box-shadow: 0 12px 48px rgba(0,0,0,0.18); width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .proc-modal__header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid #f0f2f5; }
    .proc-modal__header h2 { font-size: 1.05rem; }
    .proc-modal__close { font-size: 1.5rem; color: #8888a4; padding: 0 4px; line-height: 1; border-radius: 4px; transition: all 0.12s; }
    .proc-modal__close:hover { background: #f0f2f5; color: #1a1a2e; }
    .proc-modal__body { padding: 1.25rem 1.5rem; }
    .proc-modal__footer { display: flex; justify-content: flex-end; gap: 0.5rem; padding: 0.75rem 1.5rem; border-top: 1px solid #f0f2f5; background: #f8f9fb; border-radius: 0 0 12px 12px; }

    /* ---- Form (modal) ---- */
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: #4a4a68; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.45rem 0.65rem; border: 1.5px solid #e0e4ea; border-radius: 6px; font-size: 0.88rem;
      font-family: inherit; color: #1a1a2e; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2d6a4f; box-shadow: 0 0 0 3px rgba(45,106,79,0.12); }
    .form-group textarea { resize: vertical; }
    .form-full { grid-column: 1 / -1; }

    /* ---- Boolean badges ---- */
    .proc-bool { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .proc-bool--yes { background: #e8f5e9; color: #2e7d32; }
    .proc-bool--no  { background: #f0f2f5; color: #8888a4; }

    /* ---- URL links in table ---- */
    .proc-url { color: #104547; font-size: 0.8rem; word-break: break-all; }
    .proc-url:hover { text-decoration: underline; }
    .proc-url i { margin-right: 3px; font-size: 0.7rem; }

    /* Toggle checkbox in modal */
    .form-check { display: flex; align-items: center; gap: 0.5rem; padding-top: 1.4rem; }
    .form-check input[type="checkbox"] { width: 18px; height: 18px; accent-color: #104547; cursor: pointer; }
    .form-check label { font-size: 0.8rem; font-weight: 600; color: #4a4a68; cursor: pointer; }

    /* ---- Other View: Quick Links ---- */
    .other-view { display: none; }
    .other-section { margin-bottom: 2rem; }
    .other-section__title {
      font-size: 0.95rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .other-section__title i { color: #104547; font-size: 0.85rem; }
    .quick-links-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem;
    }
    .quick-link-card {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem;
      background: #fff; border-radius: 8px; border: 1.5px solid #e0e4ea;
      text-decoration: none; color: inherit; transition: all 0.15s ease;
    }
    .quick-link-card:hover { border-color: #2d6a4f; box-shadow: 0 2px 8px rgba(16,69,71,0.1); transform: translateY(-1px); }
    .quick-link-card__icon {
      width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      background: #104547; color: #fff; font-size: 0.9rem; flex-shrink: 0;
    }
    .quick-link-card__text { flex: 1; min-width: 0; }
    .quick-link-card__name { font-size: 0.88rem; font-weight: 600; color: #1a1a2e; }
    .quick-link-card__url { font-size: 0.72rem; color: #8888a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .quick-link-card__arrow { color: #8888a4; font-size: 0.75rem; flex-shrink: 0; transition: transform 0.15s; }
    .quick-link-card:hover .quick-link-card__arrow { transform: translateX(2px); color: #2d6a4f; }

    /* ---- Other View: Statewide Resources ---- */
    .state-resources-group { margin-bottom: 1.25rem; }
    .state-resources-group__header {
      font-size: 0.82rem; font-weight: 700; color: #104547; padding: 0.4rem 0.75rem;
      background: #e8f0ed; border-radius: 6px 6px 0 0; display: flex; align-items: center; gap: 0.4rem;
    }
    .state-resources-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; background: #fff; border-radius: 0 0 6px 6px; overflow: hidden; border: 1px solid #e0e4ea; border-top: none; }
    .state-resources-table th { text-align: left; padding: 0.45rem 0.75rem; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #8888a4; background: #f5f7fa; border-bottom: 1px solid #e0e4ea; }
    .state-resources-table td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #f0f2f5; color: #4a4a68; }
    .state-resources-table tr:last-child td { border-bottom: none; }
    .state-resources-table a { color: #104547; font-size: 0.8rem; }
    .state-resources-table a:hover { text-decoration: underline; }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .proc-layout { grid-template-columns: 1fr; }
      .proc-sidebar { flex-direction: row; overflow-x: auto; padding: 0.75rem; }
      .proc-sidebar__brand { display: none; }
      .proc-sidebar__nav { flex-direction: row; gap: 0.25rem; }
      .proc-sidebar__back { display: none; }
      .proc-sidebar__link { white-space: nowrap; padding: 0.4rem 0.6rem; font-size: 0.8rem; }
      .proc-main { padding: 1rem; }
      .proc-header { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
      .proc-table thead { display: none; }
      .proc-table, .proc-table tbody, .proc-table tr, .proc-table td { display: block; width: 100%; }
      .proc-table tr { padding: 0.5rem 1rem; border-bottom: 1px solid #f0f2f5; }
      .proc-table td { padding: 2px 0; border-bottom: none; }
      .proc-table td::before { content: attr(data-label); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #8888a4; display: block; }
      .proc-table td:last-child { text-align: right; }
    }
  </style>
</head>

<body>
  <div class="proc-layout">

    <!-- Sidebar -->
    <aside class="proc-sidebar">
      <div class="proc-sidebar__brand">
        <h2><i class="fas fa-clipboard-check"></i> Processing</h2>
      </div>
      <nav class="proc-sidebar__nav" id="procSidebarNav">
        <button class="proc-sidebar__link" data-type="title"><i class="fas fa-file-contract"></i> Title</button>
        <button class="proc-sidebar__link" data-type="insurance"><i class="fas fa-shield-alt"></i> Insurance</button>
        <button class="proc-sidebar__link" data-type="voe"><i class="fas fa-user-check"></i> VOE</button>
        <button class="proc-sidebar__link" data-type="taxes"><i class="fas fa-receipt"></i> Taxes</button>
        <button class="proc-sidebar__link" data-type="amc"><i class="fas fa-home"></i> AMC</button>
        <button class="proc-sidebar__link" data-type="payoffs"><i class="fas fa-credit-card"></i> Payoffs</button>
        <button class="proc-sidebar__link" data-type="other"><i class="fas fa-folder-open"></i> Other</button>
      </nav>
      <div class="proc-sidebar__back">
        <a href="#" onclick="window.close(); return false;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
      </div>
    </aside>

    <!-- Main -->
    <div class="proc-main">
      <div class="proc-header">
        <div>
          <h1 id="procTitle"><i class="fas fa-file-contract"></i> Title</h1>
          <p class="proc-header__desc" id="procDesc">Title company directory — contacts, addresses, and quick links</p>
        </div>
        <button class="btn btn-primary" id="procAddNew"><i class="fas fa-plus"></i> Add Company</button>
      </div>

      <div class="proc-toolbar">
        <div class="proc-search">
          <i class="fas fa-search"></i>
          <input type="text" id="procSearchInput" placeholder="Search by company, contact, email, or city..." autocomplete="off">
        </div>
        <select id="procStatusFilter" class="proc-filter-select" style="display:none;">
          <option value="">All Statuses</option>
          <option value="ordered">Ordered</option>
          <option value="received">Received</option>
          <option value="pending">Pending</option>
          <option value="in-review">In Review</option>
          <option value="complete">Complete</option>
          <option value="issue">Issue</option>
        </select>
        <select id="procSortBy" class="proc-filter-select" style="display:none;">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="borrower">Borrower A–Z</option>
          <option value="status">Status</option>
        </select>
      </div>

      <div class="proc-results" id="procResults">
        <table class="proc-table">
          <thead id="procTableHead">
            <tr>
              <th>Company Name</th>
              <th>Contact</th>
              <th>Email</th>
              <th>Work Phone</th>
              <th>City</th>
              <th>State</th>
              <th>Website</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="procTableBody"></tbody>
        </table>
        <div class="proc-empty" id="procEmpty">
          <i class="fas fa-search"></i>
          <h3>No title companies found</h3>
          <p>Click <strong>Add Company</strong> to create one.</p>
        </div>
        <div class="proc-loading" id="procLoading" style="display:none;">
          <div class="proc-spinner"></div>
          <span>Loading...</span>
        </div>
      </div>

      <div class="proc-pagination" id="procPagination" style="display:none;">
        <button class="btn btn-sm btn-secondary" id="procPrevPage" disabled>Previous</button>
        <span class="proc-pagination__info" id="procPageInfo">Page 1</span>
        <button class="btn btn-sm btn-secondary" id="procNextPage">Next</button>
      </div>

      <!-- Other View: Quick Links + Statewide Resources -->
      <div class="other-view" id="otherView"></div>
    </div>
  </div>

  <!-- Generic Processing Modal -->
  <div class="proc-modal-overlay" id="procModalOverlay" style="display:none;">
    <div class="proc-modal">
      <div class="proc-modal__header">
        <h2 id="procModalTitle">New Record</h2>
        <button class="proc-modal__close" id="procModalClose">&times;</button>
      </div>
      <div class="proc-modal__body">
        <div class="form-grid">
          <div class="form-group">
            <label>Borrower Name</label>
            <input type="text" id="procFieldBorrower" placeholder="Last, First">
          </div>
          <div class="form-group">
            <label>Loan Number</label>
            <input type="text" id="procFieldLoan" placeholder="e.g. 2025-001234">
          </div>
          <div class="form-group form-full">
            <label>Property Address</label>
            <input type="text" id="procFieldAddress" placeholder="123 Main St, City, ST 00000">
          </div>
          <div class="form-group">
            <label>Vendor / Company</label>
            <input type="text" id="procFieldVendor" placeholder="Company name">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="procFieldStatus">
              <option value="ordered">Ordered</option>
              <option value="pending">Pending</option>
              <option value="received">Received</option>
              <option value="in-review">In Review</option>
              <option value="complete">Complete</option>
              <option value="issue">Issue</option>
            </select>
          </div>
          <div class="form-group">
            <label>Order Date</label>
            <input type="date" id="procFieldDate">
          </div>
          <div class="form-group">
            <label>Reference / Tracking #</label>
            <input type="text" id="procFieldRef" placeholder="Optional">
          </div>
          <div class="form-group form-full">
            <label>Notes</label>
            <textarea id="procFieldNotes" rows="3" placeholder="Additional details..."></textarea>
          </div>
        </div>
      </div>
      <div class="proc-modal__footer">
        <button class="btn btn-secondary" id="procModalCancel">Cancel</button>
        <button class="btn btn-primary" id="procModalSave">Save Record</button>
      </div>
    </div>
  </div>

  <!-- Title Companies Modal -->
  <div class="proc-modal-overlay" id="titleModalOverlay" style="display:none;">
    <div class="proc-modal">
      <div class="proc-modal__header">
        <h2 id="titleModalTitle">Add Title Company</h2>
        <button class="proc-modal__close" id="titleModalClose">&times;</button>
      </div>
      <div class="proc-modal__body">
        <div class="form-grid">
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="titleFieldCompany" placeholder="e.g. First Integrity Title">
          </div>
          <div class="form-group">
            <label>Contact Name</label>
            <input type="text" id="titleFieldContact" placeholder="e.g. Katie Brandenburg">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="titleFieldEmail" placeholder="email@company.com">
          </div>
          <div class="form-group">
            <label>Work Phone</label>
            <input type="tel" id="titleFieldWorkPhone" placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label>Mobile Phone</label>
            <input type="tel" id="titleFieldMobilePhone" placeholder="(555) 123-4567">
          </div>
          <div class="form-group">
            <label>Fax</label>
            <input type="tel" id="titleFieldFax" placeholder="(555) 123-4567">
          </div>
          <div class="form-group form-full">
            <label>Street</label>
            <input type="text" id="titleFieldStreet" placeholder="123 Main St, Suite 100">
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="titleFieldCity" placeholder="Denver">
          </div>
          <div class="form-group">
            <label>State</label>
            <input type="text" id="titleFieldState" placeholder="CO" maxlength="2" style="text-transform:uppercase;">
          </div>
          <div class="form-group">
            <label>Zip Code</label>
            <input type="text" id="titleFieldZip" placeholder="80228">
          </div>
          <div class="form-group">
            <label>Toll Free Phone</label>

        <button class="btn btn-primary" id="taxModalSave">Save County</button>

  <!-- Processing Links Modal (VOE, AMC, Payoffs, Insurance) -->
  <div class="proc-modal-overlay" id="linksModalOverlay" style="display:none;">
    <div class="proc-modal">
      <div class="proc-modal__header">
        <h2 id="linksModalTitle">Add Link</h2>
        <button class="proc-modal__close" id="linksModalClose">&times;</button>
      </div>
      <div class="proc-modal__body">
        <div class="form-grid">
          <div class="form-group form-full">
            <label>Name</label>
            <input type="text" id="linksFieldName" placeholder="e.g. The Work Number">
          </div>
          <div class="form-group form-full">
            <label>URL</label>
            <input type="url" id="linksFieldUrl" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Icon (FontAwesome class)</label>
            <input type="text" id="linksFieldIcon" placeholder="e.g. fa-building" value="fa-link">
          </div>

      <div class="proc-modal__footer">
        <button class="btn btn-secondary" id="linksModalCancel">Cancel</button>
        <button class="btn btn-primary" id="linksModalSave">Save Link</button>
      </div>
    </div>
  </div>

  <script src="/js/config.js?v=20260224-2"></script>
  <script>
  (function() {
    'use strict';

    var TYPE_META = {
      title:     { name: 'Title',     icon: 'fa-file-contract', desc: 'Title company directory — contacts, addresses, and quick links' },
      insurance: { name: 'Insurance', icon: 'fa-shield-alt',    desc: 'Homeowner insurance policies, binders, and verification' },
      voe:       { name: 'VOE',       icon: 'fa-user-check',    desc: 'Verification of Employment requests and results' },
      taxes:     { name: 'Taxes',     icon: 'fa-receipt',       desc: 'County tax records, assessor portals, and treasurer links' },
      amc:       { name: 'AMC',       icon: 'fa-home',          desc: 'Appraisal management company orders and reports' },
      payoffs:   { name: 'Payoffs',   icon: 'fa-credit-card',   desc: 'Payoff statement requests and lien tracking' },
      other:     { name: 'Other',     icon: 'fa-folder-open',   desc: 'Miscellaneous processing items and documents' }
    };

    var GENERIC_THEAD = '<tr><th>Borrower</th><th>Loan #</th><th>Property</th><th>Vendor</th><th>Status</th><th>Ordered</th><th>Updated</th><th></th></tr>';
    var TITLE_THEAD = '<tr><th>Company Name</th><th>Contact</th><th>Email</th><th>Work Phone</th><th>City</th><th>State</th><th>Website</th><th></th></tr>';
    var TAX_THEAD = '<tr><th>County</th><th>State</th><th>Assessor / Property Records URL</th><th>Treasurer / Tax Cert URL</th><th>Login Required?</th><th>Known Costs/Fees</th><th>Online Portal?</th><th></th></tr>';
    var LINKS_THEAD = '<tr><th style="width:40px;"></th><th>Name</th><th>URL</th><th></th></tr>';
    var LINK_TYPES = ['voe', 'amc', 'payoffs', 'insurance'];

    var currentType = new URLSearchParams(window.location.search).get('type') || 'title';
    if (!TYPE_META[currentType]) currentType = 'title';

    var currentPage = 1, totalPages = 1, editingId = null, debounceTimer = null;

    var API_BASE = (typeof CONFIG !== 'undefined' && CONFIG.api)
      ? CONFIG.api.baseUrl
      : (window.location.protocol === 'https:' ? 'https://api.msfgco.com/api' : 'http://54.175.238.145:8080/api');

    function getToken() {
      var m = document.cookie.match(/(?:^|;\s*)auth_token=([^;]*)/);
      return localStorage.getItem('auth_token') || (m ? decodeURIComponent(m[1]) : null) || sessionStorage.getItem('auth_token');
    }
    function apiRequest(method, path, body) {
      var opts = { method: method, headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      return fetch(API_BASE + path, opts).then(function(r) { return r.json(); });
    }

    function isTitleView() { return currentType === 'title'; }
    function isTaxView() { return currentType === 'taxes'; }
    function isOtherView() { return currentType === 'other'; }
    function isLinksView() { return LINK_TYPES.indexOf(currentType) !== -1; }
    function isLookupView() { return isTitleView() || isTaxView() || isOtherView() || isLinksView(); }

    var searchInput, statusFilter, sortSelect, tableBody, tableHead, emptyState, loadingState;
    var procModalOverlay, taxModalOverlay, titleModalOverlay, linksModalOverlay, paginationWrap, pageInfo, prevBtn, nextBtn;
    var procSaveBtn, procModalTitle, taxSaveBtn, taxModalTitle, titleSaveBtn, titleModalTitle, linksSaveBtn, linksModalTitle, addNewBtn;

    document.addEventListener('DOMContentLoaded', function() {
      searchInput      = document.getElementById('procSearchInput');
      statusFilter     = document.getElementById('procStatusFilter');
      sortSelect       = document.getElementById('procSortBy');
      tableBody        = document.getElementById('procTableBody');
      tableHead        = document.getElementById('procTableHead');
      emptyState       = document.getElementById('procEmpty');
      loadingState     = document.getElementById('procLoading');
      procModalOverlay  = document.getElementById('procModalOverlay');
      taxModalOverlay   = document.getElementById('taxModalOverlay');
      titleModalOverlay = document.getElementById('titleModalOverlay');
      linksModalOverlay = document.getElementById('linksModalOverlay');
      paginationWrap    = document.getElementById('procPagination');
      pageInfo          = document.getElementById('procPageInfo');
      prevBtn           = document.getElementById('procPrevPage');
      nextBtn           = document.getElementById('procNextPage');
      procSaveBtn       = document.getElementById('procModalSave');
      procModalTitle    = document.getElementById('procModalTitle');
      taxSaveBtn        = document.getElementById('taxModalSave');
      taxModalTitle     = document.getElementById('taxModalTitle');
      titleSaveBtn      = document.getElementById('titleModalSave');
      titleModalTitle   = document.getElementById('titleModalTitle');
      linksSaveBtn      = document.getElementById('linksModalSave');
      linksModalTitle   = document.getElementById('linksModalTitle');
      addNewBtn         = document.getElementById('procAddNew');

      setActiveType(currentType);

      // Sidebar nav
      document.querySelectorAll('#procSidebarNav .proc-sidebar__link').forEach(function(btn) {
        btn.addEventListener('click', function() {
          currentType = this.dataset.type;
          currentPage = 1;
          searchInput.value = '';
          setActiveType(currentType);
          window.history.replaceState(null, '', '?type=' + currentType);
          runSearch();
        });
      });

      // Search
      searchInput.addEventListener('input', function() { clearTimeout(debounceTimer); debounceTimer = setTimeout(function() { currentPage = 1; runSearch(); }, 300); });
      searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { clearTimeout(debounceTimer); currentPage = 1; runSearch(); } });
      statusFilter.addEventListener('change', function() { currentPage = 1; runSearch(); });
      sortSelect.addEventListener('change', function() { currentPage = 1; runSearch(); });

      // Generic modal
      addNewBtn.addEventListener('click', function() { isTitleView() ? openTitleModal() : isTaxView() ? openTaxModal() : isLinksView() ? openLinksModal() : openProcModal(); });
      document.getElementById('procModalClose').addEventListener('click', closeProcModal);
      document.getElementById('procModalCancel').addEventListener('click', closeProcModal);
      procSaveBtn.addEventListener('click', saveProcRecord);
      procModalOverlay.addEventListener('click', function(e) { if (e.target === procModalOverlay) closeProcModal(); });

      // Title modal
      document.getElementById('titleModalClose').addEventListener('click', closeTitleModal);
      document.getElementById('titleModalCancel').addEventListener('click', closeTitleModal);
      titleSaveBtn.addEventListener('click', saveTitleCompany);
      titleModalOverlay.addEventListener('click', function(e) { if (e.target === titleModalOverlay) closeTitleModal(); });

      // Tax modal
      document.getElementById('taxModalClose').addEventListener('click', closeTaxModal);
      document.getElementById('taxModalCancel').addEventListener('click', closeTaxModal);
      taxSaveBtn.addEventListener('click', saveTaxCounty);
      taxModalOverlay.addEventListener('click', function(e) { if (e.target === taxModalOverlay) closeTaxModal(); });

      // Links modal
      document.getElementById('linksModalClose').addEventListener('click', closeLinksModal);
      document.getElementById('linksModalCancel').addEventListener('click', closeLinksModal);
      linksSaveBtn.addEventListener('click', saveLink);
      linksModalOverlay.addEventListener('click', function(e) { if (e.target === linksModalOverlay) closeLinksModal(); });

      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (titleModalOverlay.style.display !== 'none') closeTitleModal();
        if (procModalOverlay.style.display !== 'none') closeProcModal();
        if (taxModalOverlay.style.display !== 'none') closeTaxModal();
        if (linksModalOverlay.style.display !== 'none') closeLinksModal();
      });

      // Pagination
      prevBtn.addEventListener('click', function() { if (currentPage > 1) { currentPage--; runSearch(); } });
      nextBtn.addEventListener('click', function() { if (currentPage < totalPages) { currentPage++; runSearch(); } });

      document.getElementById('procFieldDate').value = todayISO();
      runSearch();
    });

    function setActiveType(type) {
      var meta = TYPE_META[type];
      document.getElementById('procTitle').innerHTML = '<i class="fas ' + meta.icon + '"></i> ' + meta.name;
      document.getElementById('procDesc').textContent = meta.desc;
      document.querySelectorAll('#procSidebarNav .proc-sidebar__link').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.type === type);
      });
      var otherView = document.getElementById('otherView');
      var procResults = document.getElementById('procResults');
      var toolbar = document.querySelector('.proc-toolbar');
      if (isOtherView()) {
        procResults.style.display = 'none';
        toolbar.style.display = 'none';
        addNewBtn.style.display = 'none';
        paginationWrap.style.display = 'none';
        otherView.style.display = 'block';
        return;
      }
      otherView.style.display = 'none';
      procResults.style.display = '';
      toolbar.style.display = '';
      addNewBtn.style.display = '';
      // Switch table headers and toolbar
      tableHead.innerHTML = isTitleView() ? TITLE_THEAD : isTaxView() ? TAX_THEAD : isLinksView() ? LINKS_THEAD : GENERIC_THEAD;
      statusFilter.style.display = isLookupView() ? 'none' : '';
      sortSelect.style.display = isLookupView() ? 'none' : '';
      addNewBtn.innerHTML = isTitleView() ? '<i class="fas fa-plus"></i> Add Company' : isTaxView() ? '<i class="fas fa-plus"></i> Add County' : isLinksView() ? '<i class="fas fa-plus"></i> Add Link' : '<i class="fas fa-plus"></i> New Record';
      searchInput.placeholder = isTitleView() ? 'Search by company, contact, email, or city...' : isTaxView() ? 'Search by county or state...' : isLinksView() ? 'Search by name or URL...' : 'Search by borrower, loan #, or address...';
    }

    /* ==================== SEARCH ==================== */

    function runSearch() {
      if (isOtherView()) { renderOtherView(); return; }
      showLoading();
      if (isTitleView()) {
        var params = new URLSearchParams({ q: (searchInput.value || '').trim() });
        apiRequest('GET', '/processing/title-companies?' + params.toString())
          .then(function(data) {
            if (!data.success) { showEmpty(data.error || 'Failed to load.'); return; }
            paginationWrap.style.display = 'none';
            renderTitleResults(data.results);
          })
          .catch(function() { showEmpty('Connection error.'); });
      } else if (isTaxView()) {
        var params = new URLSearchParams({ q: (searchInput.value || '').trim() });
        apiRequest('GET', '/processing/tax-counties?' + params.toString())
          .then(function(data) {
            if (!data.success) { showEmpty(data.error || 'Failed to load.'); return; }
            paginationWrap.style.display = 'none';
            renderTaxResults(data.results);
          })
          .catch(function() { showEmpty('Connection error.'); });
      } else if (isLinksView()) {
        var params = new URLSearchParams({ q: (searchInput.value || '').trim() });
        apiRequest('GET', '/processing/links/' + currentType + '?' + params.toString())
          .then(function(data) {
            if (!data.success) { showEmpty(data.error || 'Failed to load.'); return; }
            paginationWrap.style.display = 'none';
            renderLinksResults(data.results);
          })
          .catch(function() { showEmpty('Connection error.'); });
      } else {
        var params = new URLSearchParams({ q: (searchInput.value || '').trim(), status: statusFilter.value, sort: sortSelect.value, page: currentPage });
        apiRequest('GET', '/processing/' + currentType + '?' + params.toString())
          .then(function(data) {
            if (!data.success) { showEmpty(data.error || 'Search failed.'); return; }
            totalPages = data.totalPages || 1; currentPage = data.page || 1;
            updatePagination(data.total);
            renderProcResults(data.results);
          })
          .catch(function() { showEmpty('Connection error.'); });
      }
    }

    /* ==================== GENERIC PROCESSING RENDER ==================== */

    function renderProcResults(results) {
      hideLoading();
      if (!results || results.length === 0) { showEmpty(); return; }
      emptyState.style.display = 'none';
      tableBody.innerHTML = '';
      results.forEach(function(rec) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td data-label="Borrower">' + esc(rec.borrower) + '</td>' +
          '<td data-label="Loan #">' + esc(rec.loan_number) + '</td>' +
          '<td data-label="Property">' + esc(rec.address) + '</td>' +
          '<td data-label="Vendor">' + esc(rec.vendor) + '</td>' +
          '<td data-label="Status">' + statusBadge(rec.status) + '</td>' +
          '<td data-label="Ordered">' + fmtDate(rec.ordered_date) + '</td>' +
          '<td data-label="Updated">' + fmtDate(rec.updated_at) + '</td>' +
          '<td class="proc-row-actions">' +
            '<button class="proc-row-action proc-edit-btn" title="Edit"><i class="fas fa-pen"></i></button>' +
            '<button class="proc-row-action proc-delete-btn" title="Delete"><i class="fas fa-trash"></i></button>' +
          '</td>';
        tr.querySelector('.proc-edit-btn').addEventListener('click', function(e) { e.stopPropagation(); openProcModal(rec); });
        tr.querySelector('.proc-delete-btn').addEventListener('click', function(e) { e.stopPropagation(); deleteProcRecord(rec.id, rec.borrower); });
        tableBody.appendChild(tr);
      });
    }

    /* ==================== TITLE COMPANIES RENDER ==================== */

    function renderTitleResults(results) {
      hideLoading();
      if (!results || results.length === 0) { showEmpty('No title companies found. Click <strong>Add Company</strong> to create one.'); return; }
      emptyState.style.display = 'none';
      tableBody.innerHTML = '';
      results.forEach(function(rec) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td data-label="Company">' + esc(rec.company_name) + '</td>' +
          '<td data-label="Contact">' + esc(rec.contact_name) + '</td>' +
          '<td data-label="Email">' + (rec.email ? '<a href="mailto:' + esc(rec.email) + '" class="proc-url">' + esc(rec.email) + '</a>' : '<span style="color:#bbb;">—</span>') + '</td>' +
          '<td data-label="Work Phone">' + (rec.work_phone ? '<a href="tel:' + esc(rec.work_phone) + '" class="proc-url">' + esc(rec.work_phone) + '</a>' : '<span style="color:#bbb;">—</span>') + '</td>' +
          '<td data-label="City">' + esc(rec.city) + '</td>' +
          '<td data-label="State">' + esc(rec.state) + '</td>' +
          '<td data-label="Website">' + urlLink(rec.website) + '</td>' +
          '<td class="proc-row-actions">' +
            '<button class="proc-row-action proc-edit-btn" title="Edit"><i class="fas fa-pen"></i></button>' +
            '<button class="proc-row-action proc-delete-btn" title="Delete"><i class="fas fa-trash"></i></button>' +
          '</td>';
        tr.querySelector('.proc-edit-btn').addEventListener('click', function(e) { e.stopPropagation(); openTitleModal(rec); });
        tr.querySelector('.proc-delete-btn').addEventListener('click', function(e) { e.stopPropagation(); deleteTitleCompany(rec.id, rec.company_name); });
        tableBody.appendChild(tr);
      });
    }

    /* ==================== TAX COUNTIES RENDER ==================== */

    function renderTaxResults(results) {
      hideLoading();
      if (!results || results.length === 0) { showEmpty('No counties found. Click <strong>Add County</strong> to create one.'); return; }
      emptyState.style.display = 'none';
      tableBody.innerHTML = '';
      results.forEach(function(rec) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td data-label="County">' + esc(rec.county) + '</td>' +
          '<td data-label="State">' + esc(rec.state) + '</td>' +
          '<td data-label="Assessor URL">' + urlLink(rec.assessor_url) + '</td>' +
          '<td data-label="Treasurer URL">' + urlLink(rec.treasurer_url) + '</td>' +
          '<td data-label="Login Required?">' + boolBadge(rec.login_required) + '</td>' +
          '<td data-label="Costs/Fees">' + esc(rec.known_costs_fees) + '</td>' +
          '<td data-label="Online Portal?">' + boolBadge(rec.online_portal) + '</td>' +
          '<td class="proc-row-actions">' +
            '<button class="proc-row-action proc-edit-btn" title="Edit"><i class="fas fa-pen"></i></button>' +
            '<button class="proc-row-action proc-delete-btn" title="Delete"><i class="fas fa-trash"></i></button>' +
          '</td>';
        tr.querySelector('.proc-edit-btn').addEventListener('click', function(e) { e.stopPropagation(); openTaxModal(rec); });
        tr.querySelector('.proc-delete-btn').addEventListener('click', function(e) { e.stopPropagation(); deleteTaxCounty(rec.id, rec.county); });
        tableBody.appendChild(tr);
      });
    }

    function urlLink(url) {
      if (!url) return '<span style="color:#bbb;">—</span>';
      var display = url.replace(/^https?:\/\/(www\.)?/, '').split('/')[0];
      return '<a href="' + esc(url) + '" target="_blank" rel="noopener" class="proc-url"><i class="fas fa-external-link-alt"></i>' + esc(display) + '</a>';
    }
    function boolBadge(val) {
      return val ? '<span class="proc-bool proc-bool--yes">Yes</span>' : '<span class="proc-bool proc-bool--no">No</span>';
    }

    /* ==================== PROCESSING LINKS RENDER (VOE, AMC, Payoffs, Insurance) ==================== */

    function renderLinksResults(results) {
      hideLoading();
      if (!results || results.length === 0) { showEmpty(); return; }
      emptyState.style.display = 'none';
      tableBody.innerHTML = '';
      results.forEach(function(rec) {
        var domain = rec.url ? rec.url.replace(/^https?:\/\/(www\.)?/, '').split(/[/?#]/)[0] : '';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td data-label="Icon" style="text-align:center;width:40px;"><i class="fas ' + esc(rec.icon || 'fa-link') + '" style="color:#104547;font-size:1rem;"></i></td>' +
          '<td data-label="Name">' + esc(rec.name) + '</td>' +
          '<td data-label="URL"><a href="' + esc(rec.url) + '" target="_blank" rel="noopener" class="proc-url"><i class="fas fa-external-link-alt"></i>' + esc(domain) + '</a></td>' +
          '<td class="proc-row-actions">' +
            '<button class="proc-row-action proc-edit-btn" title="Edit"><i class="fas fa-pen"></i></button>' +
            '<button class="proc-row-action proc-delete-btn" title="Delete"><i class="fas fa-trash"></i></button>' +
          '</td>';
        tr.querySelector('.proc-edit-btn').addEventListener('click', function(e) { e.stopPropagation(); openLinksModal(rec); });
        tr.querySelector('.proc-delete-btn').addEventListener('click', function(e) { e.stopPropagation(); deleteLink(rec.id, rec.name); });
        tr.addEventListener('click', function() { window.open(rec.url, '_blank'); });
        tableBody.appendChild(tr);
      });
    }

    /* ==================== OTHER VIEW ==================== */

    function renderOtherView() {
      var quickLinks = [
        { name: 'Rescission Calendar', url: 'https://www.atsdocs.com/rescissioncalendar.aspx', icon: 'fa-calendar-alt' },
        { name: 'eFax Portal', url: 'https://myportal.efax.com/login', icon: 'fa-fax' },
        { name: 'Date Duration Calculator', url: 'https://www.timeanddate.com/date/duration.html', icon: 'fa-calculator' },
        { name: 'IBTS (Inspections)', url: 'https://www.ibts.org/what-we-do', icon: 'fa-hard-hat' },
        { name: 'TitlePro247', url: 'https://v3.titlepro247.com/Home?ReturnUrl=%2FAccount%2FIndex&ReturnUrl=%2FAccount%2FIndex', icon: 'fa-file-signature' },
        { name: '3-Day Rule / TRID Guide', url: 'https://www.octitle.com/pdf/3DayRuleTRID.pdf', icon: 'fa-file-pdf' },
        { name: 'HomeWise Docs', url: 'https://www.homewisedocs.com/', icon: 'fa-file-alt' }
      ];

      var stateResources = [
        { state: 'Colorado', abbr: 'CO', resources: [
          { name: 'CO Dept of Local Affairs - Property Tax', url: 'https://dpt.colorado.gov/', note: 'Links to all county assessor/treasurer offices' },
          { name: 'Colorado County Assessors Assoc', url: 'https://coloradoassessors.org/', note: 'Directory of all county assessors' }
        ]},
        { state: 'North Dakota', abbr: 'ND', resources: [
          { name: 'ND Property Tax Info Portal', url: 'https://www.stutsmancounty.gov/ndptip/', note: 'Statewide map for county parcel tax info' },
          { name: 'ND Assessors Network', url: 'https://www.northdakotaassessors.com/', note: 'Most counties linked - standardized search' },
          { name: 'ND GIS Hub', url: 'https://www.gis.nd.gov/', note: 'Official statewide GIS parcel dataset' },
          { name: 'NDRIN (Recorders Info Network)', url: 'https://www.ndrin.com/', note: 'Subscription - recorded docs 2004+' },
          { name: 'Tyler iTax Portal', url: 'https://itax.tylertech.com/', note: 'Many ND counties - add county suffix' }
        ]},
        { state: 'South Dakota', abbr: 'SD', resources: [
          { name: 'SD Property Tax Portal', url: 'https://sdproptax.info/', note: 'Statewide property tax info' },
          { name: 'SD Dept of Revenue - County Directors', url: 'https://dor.sd.gov/government/director-of-equalization/contact-county-directors-of-equalization/', note: 'All county Directors of Equalization' },
          { name: 'SD County Treasurers Directory', url: 'https://dor.sd.gov/government/county-treasurers/', note: 'All county treasurer contacts' },
          { name: 'South Dakota Directors Network', url: 'https://www.southdakotadirectors.com/', note: 'Property search for participating counties' },
          { name: 'Beacon (Schneider GIS)', url: 'https://beacon.schneidercorp.com/', note: 'Brookings, Codington, Lake, Lincoln, Minnehaha, Union, Yankton' }
        ]},
        { state: 'Minnesota', abbr: 'MN', resources: [
          { name: 'Minnesota Assessors Portal', url: 'https://minnesotaassessors.com/', note: 'Statewide property search - Clay, Goodhue, Lyon, Polk, Steele, Washington' },
          { name: 'MN Dept of Revenue - Property Tax', url: 'https://www.revenue.state.mn.us/property-tax', note: 'State property tax info and resources' },
          { name: 'Beacon (Schneider GIS)', url: 'https://beacon.schneidercorp.com/', note: 'Blue Earth, Cottonwood, Freeborn, Isanti, Nobles, Pine, Ramsey, Rice, Sherburne, Winona, Wright' },
          { name: 'MN Assn of County Officers', url: 'https://www.mncounty.org/', note: 'Directory of all county offices' },
          { name: 'Hennepin County Property Info', url: 'https://www.hennepin.us/residents/property', note: 'Largest MN county - comprehensive property database' }
        ]},
        { state: 'Michigan', abbr: 'MI', resources: [
          { name: 'BS&A Online', url: 'https://bsaonline.com/', note: 'Most MI counties use this - property search and tax lookup' },
          { name: 'MI Dept of Treasury - Property Tax', url: 'https://www.michigan.gov/treasury/local/property-tax', note: 'State property tax info and resources' },
          { name: 'MI Assn of County Treasurers', url: 'https://www.michigantreasurers.org/', note: 'Directory of all county treasurers' },
          { name: 'AccessMyGov.com', url: 'https://www.accessmygov.com/', note: 'Several MI counties - tax and assessment portal' },
          { name: 'Wayne County Treasurer', url: 'https://www.waynecounty.com/elected/treasurer/', note: 'Largest MI county; Detroit metro; online tax auction' }
        ]},
        { state: 'Illinois', abbr: 'IL', resources: [
          { name: 'Cook County Assessor', url: 'https://www.cookcountyassessor.com/', note: 'Chicago/suburbs - largest IL county; separate system' },
          { name: 'Cook County Treasurer', url: 'https://www.cookcountytreasurer.com/', note: 'Cook County tax payments and tax cert info' },
          { name: 'IL Property Tax Appeal Board', url: 'https://www.ptab.illinois.gov/', note: 'State property tax appeal board' },
          { name: 'IL Dept of Revenue - Property Tax', url: 'https://tax.illinois.gov/localgovernments/property.html', note: 'State property tax resources and forms' },
          { name: 'IL Assn of County Board Members', url: 'https://www.ilcounty.org/', note: 'Directory of all county offices' },
          { name: 'Devnet GIS/Property Portals', url: 'https://www.devnetinc.com/', note: 'Several IL counties use Devnet for property search' }
        ]}
      ];

      var html = '';

      // Quick Links section
      html += '<div class="other-section">';
      html += '<div class="other-section__title"><i class="fas fa-external-link-alt"></i> Quick Links &amp; Tools</div>';
      html += '<div class="quick-links-grid">';
      quickLinks.forEach(function(link) {
        var domain = link.url.replace(/^https?:\/\/(www\.)?/, '').split(/[/?#]/)[0];
        html += '<a href="' + esc(link.url) + '" target="_blank" rel="noopener" class="quick-link-card">' +
          '<div class="quick-link-card__icon"><i class="fas ' + link.icon + '"></i></div>' +
          '<div class="quick-link-card__text">' +
            '<div class="quick-link-card__name">' + esc(link.name) + '</div>' +
            '<div class="quick-link-card__url">' + esc(domain) + '</div>' +
          '</div>' +
          '<i class="fas fa-arrow-right quick-link-card__arrow"></i>' +
        '</a>';
      });
      html += '</div></div>';

      // Statewide Resources section
      html += '<div class="other-section">';
      html += '<div class="other-section__title"><i class="fas fa-map-marked-alt"></i> Statewide Resources</div>';
      stateResources.forEach(function(group) {
        html += '<div class="state-resources-group">';
        html += '<div class="state-resources-group__header"><i class="fas fa-flag"></i> ' + esc(group.state) + ' (' + esc(group.abbr) + ')</div>';
        html += '<table class="state-resources-table"><thead><tr><th>Resource</th><th>Link</th><th>Notes</th></tr></thead><tbody>';
        group.resources.forEach(function(r) {
          var domain = r.url.replace(/^https?:\/\/(www\.)?/, '').split(/[/?#]/)[0];
          html += '<tr>' +
            '<td style="font-weight:600;">' + esc(r.name) + '</td>' +
            '<td><a href="' + esc(r.url) + '" target="_blank" rel="noopener"><i class="fas fa-external-link-alt" style="margin-right:3px;font-size:0.7rem;"></i>' + esc(domain) + '</a></td>' +
            '<td>' + esc(r.note) + '</td>' +

        });
        html += '</tbody></table></div>';
      });
      html += '</div>';

      document.getElementById('otherView').innerHTML = html;
    }

    /* ==================== HELPERS ==================== */

    function statusBadge(s) {
      var slug = (s || '').toLowerCase().replace(/\s+/g, '-');
      var label = s ? s.charAt(0).toUpperCase() + s.slice(1).replace('-', ' ') : 'Unknown';
      return '<span class="proc-status proc-status--' + esc(slug) + '">' + esc(label) + '</span>';
    }
    function fmtDate(d) {
      if (!d) return '—';
      try { var dt = new Date(d + (d.length === 10 ? 'T00:00:00' : '')); return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
      catch(e) { return d; }
    }
    function esc(s) { if (s == null) return ''; var el = document.createElement('span'); el.textContent = String(s); return el.innerHTML; }
    function todayISO() { return new Date().toISOString().split('T')[0]; }

    function updatePagination(total) {
      if (total <= 25 && currentPage === 1) { paginationWrap.style.display = 'none'; return; }
      paginationWrap.style.display = '';
      pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages + ' (' + total + ' records)';
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }
    function showEmpty(msg) {
      hideLoading(); tableBody.innerHTML = ''; paginationWrap.style.display = 'none'; emptyState.style.display = '';
      var heading = isTitleView() ? 'No title companies found' : isTaxView() ? 'No counties found' : isLinksView() ? 'No links found' : 'No records found';
      emptyState.querySelector('h3').textContent = heading;
      var defaultMsg = isTitleView() ? 'Click <strong>Add Company</strong> to create one.' : isTaxView() ? 'Click <strong>Add County</strong> to create one.' : isLinksView() ? 'Click <strong>Add Link</strong> to create one.' : 'Click <strong>New Record</strong> to add one.';
      emptyState.querySelector('p').innerHTML = msg || defaultMsg;
    }
    function showLoading() { emptyState.style.display = 'none'; tableBody.innerHTML = ''; loadingState.style.display = ''; }
    function hideLoading() { loadingState.style.display = 'none'; }

    /* ==================== GENERIC PROCESSING MODAL ==================== */

    function openProcModal(record) {
      editingId = record ? record.id : null;
      var meta = TYPE_META[currentType];
      if (record) {
        procModalTitle.textContent = 'Edit ' + meta.name + ' Record';
        procSaveBtn.textContent = 'Update Record';
        document.getElementById('procFieldBorrower').value = record.borrower || '';
        document.getElementById('procFieldLoan').value = record.loan_number || '';
        document.getElementById('procFieldAddress').value = record.address || '';
        document.getElementById('procFieldVendor').value = record.vendor || '';
        document.getElementById('procFieldStatus').value = record.status || 'ordered';
        document.getElementById('procFieldDate').value = record.ordered_date ? record.ordered_date.split('T')[0] : '';
        document.getElementById('procFieldRef').value = record.reference || '';
        document.getElementById('procFieldNotes').value = record.notes || '';
      } else {
        procModalTitle.textContent = 'New ' + meta.name + ' Record';
        procSaveBtn.textContent = 'Save Record';
        ['procFieldBorrower','procFieldLoan','procFieldAddress','procFieldVendor','procFieldRef','procFieldNotes'].forEach(function(id) { document.getElementById(id).value = ''; });
        document.getElementById('procFieldStatus').value = 'ordered';
        document.getElementById('procFieldDate').value = todayISO();
      }
      procModalOverlay.style.display = '';
      document.body.style.overflow = 'hidden';
      setTimeout(function() { document.getElementById('procFieldBorrower').focus(); }, 100);
    }
    function closeProcModal() { procModalOverlay.style.display = 'none'; document.body.style.overflow = ''; editingId = null; }

    function saveProcRecord() {
      var borrower = (document.getElementById('procFieldBorrower').value || '').trim();
      if (!borrower) { document.getElementById('procFieldBorrower').focus(); return; }
      var payload = {
        borrower: borrower,
        loanNumber: (document.getElementById('procFieldLoan').value || '').trim(),
        address: (document.getElementById('procFieldAddress').value || '').trim(),
        vendor: (document.getElementById('procFieldVendor').value || '').trim(),
        status: document.getElementById('procFieldStatus').value,
        orderedDate: document.getElementById('procFieldDate').value,
        reference: (document.getElementById('procFieldRef').value || '').trim(),
        notes: (document.getElementById('procFieldNotes').value || '').trim()
      };
      procSaveBtn.disabled = true; procSaveBtn.textContent = 'Saving...';
      var method = editingId ? 'PUT' : 'POST';
      var path = editingId ? '/processing/' + currentType + '/' + editingId : '/processing/' + currentType;
      apiRequest(method, path, payload)
        .then(function(data) { procSaveBtn.disabled = false; if (!data.success) { alert(data.error || 'Failed to save.'); return; } closeProcModal(); runSearch(); })
        .catch(function() { procSaveBtn.disabled = false; alert('Connection error.'); });
    }

    function deleteProcRecord(id, name) {
      if (!confirm('Delete record for "' + name + '"?')) return;
      apiRequest('DELETE', '/processing/' + currentType + '/' + id)
        .then(function(data) { if (!data.success) { alert(data.error || 'Failed.'); return; } runSearch(); })
        .catch(function() { alert('Connection error.'); });
    }

    /* ==================== TITLE COMPANIES MODAL ==================== */

    function openTitleModal(record) {
      editingId = record ? record.id : null;
      if (record) {
        titleModalTitle.textContent = 'Edit Title Company';
        titleSaveBtn.textContent = 'Update Company';
        document.getElementById('titleFieldCompany').value = record.company_name || '';
        document.getElementById('titleFieldContact').value = record.contact_name || '';
        document.getElementById('titleFieldEmail').value = record.email || '';
        document.getElementById('titleFieldWorkPhone').value = record.work_phone || '';
        document.getElementById('titleFieldMobilePhone').value = record.mobile_phone || '';
        document.getElementById('titleFieldFax').value = record.fax || '';
        document.getElementById('titleFieldStreet').value = record.street || '';
        document.getElementById('titleFieldCity').value = record.city || '';
        document.getElementById('titleFieldState').value = record.state || '';
        document.getElementById('titleFieldZip').value = record.zip_code || '';
        document.getElementById('titleFieldTollFree').value = record.toll_free_phone || '';
        document.getElementById('titleFieldWebsite').value = record.website || '';
      } else {
        titleModalTitle.textContent = 'Add Title Company';
        titleSaveBtn.textContent = 'Save Company';
        ['titleFieldCompany','titleFieldContact','titleFieldEmail','titleFieldWorkPhone','titleFieldMobilePhone','titleFieldFax','titleFieldStreet','titleFieldCity','titleFieldState','titleFieldZip','titleFieldTollFree','titleFieldWebsite'].forEach(function(id) { document.getElementById(id).value = ''; });
      }
      titleModalOverlay.style.display = '';
      document.body.style.overflow = 'hidden';
      setTimeout(function() { document.getElementById('titleFieldCompany').focus(); }, 100);
    }
    function closeTitleModal() { titleModalOverlay.style.display = 'none'; document.body.style.overflow = ''; editingId = null; }

    function saveTitleCompany() {
      var companyName = (document.getElementById('titleFieldCompany').value || '').trim();
      if (!companyName) { document.getElementById('titleFieldCompany').focus(); return; }
      var payload = {
        companyName: companyName,
        contactName: (document.getElementById('titleFieldContact').value || '').trim(),
        email: (document.getElementById('titleFieldEmail').value || '').trim(),
        workPhone: (document.getElementById('titleFieldWorkPhone').value || '').trim(),
        mobilePhone: (document.getElementById('titleFieldMobilePhone').value || '').trim(),
        fax: (document.getElementById('titleFieldFax').value || '').trim(),
        street: (document.getElementById('titleFieldStreet').value || '').trim(),
        city: (document.getElementById('titleFieldCity').value || '').trim(),
        state: (document.getElementById('titleFieldState').value || '').trim().toUpperCase(),
        zipCode: (document.getElementById('titleFieldZip').value || '').trim(),
        tollFreePhone: (document.getElementById('titleFieldTollFree').value || '').trim(),
        website: (document.getElementById('titleFieldWebsite').value || '').trim()
      };
      titleSaveBtn.disabled = true; titleSaveBtn.textContent = 'Saving...';
      var method = editingId ? 'PUT' : 'POST';
      var path = editingId ? '/processing/title-companies/' + editingId : '/processing/title-companies';
      apiRequest(method, path, payload)
        .then(function(data) { titleSaveBtn.disabled = false; if (!data.success) { alert(data.error || 'Failed to save.'); return; } closeTitleModal(); runSearch(); })
        .catch(function() { titleSaveBtn.disabled = false; alert('Connection error.'); });
    }

    function deleteTitleCompany(id, name) {
      if (!confirm('Delete "' + name + '"?')) return;
      apiRequest('DELETE', '/processing/title-companies/' + id)
        .then(function(data) { if (!data.success) { alert(data.error || 'Failed.'); return; } runSearch(); })
        .catch(function() { alert('Connection error.'); });
    }

    /* ==================== TAX COUNTIES MODAL ==================== */

    function openTaxModal(record) {
      editingId = record ? record.id : null;
      if (record) {
        taxModalTitle.textContent = 'Edit County';
        taxSaveBtn.textContent = 'Update County';
        document.getElementById('taxFieldCounty').value = record.county || '';
        document.getElementById('taxFieldState').value = record.state || '';
        document.getElementById('taxFieldAssessor').value = record.assessor_url || '';
        document.getElementById('taxFieldTreasurer').value = record.treasurer_url || '';
        document.getElementById('taxFieldCosts').value = record.known_costs_fees || '';
        document.getElementById('taxFieldLogin').checked = !!record.login_required;
        document.getElementById('taxFieldPortal').checked = !!record.online_portal;
        document.getElementById('taxFieldNotes').value = record.notes || '';
      } else {
        taxModalTitle.textContent = 'Add County';
        taxSaveBtn.textContent = 'Save County';
        ['taxFieldCounty','taxFieldState','taxFieldAssessor','taxFieldTreasurer','taxFieldCosts','taxFieldNotes'].forEach(function(id) { document.getElementById(id).value = ''; });
        document.getElementById('taxFieldLogin').checked = false;
        document.getElementById('taxFieldPortal').checked = false;
      }
      taxModalOverlay.style.display = '';
      document.body.style.overflow = 'hidden';
      setTimeout(function() { document.getElementById('taxFieldCounty').focus(); }, 100);
    }
    function closeTaxModal() { taxModalOverlay.style.display = 'none'; document.body.style.overflow = ''; editingId = null; }

    function saveTaxCounty() {
      var county = (document.getElementById('taxFieldCounty').value || '').trim();
      var state = (document.getElementById('taxFieldState').value || '').trim().toUpperCase();
      if (!county) { document.getElementById('taxFieldCounty').focus(); return; }
      if (!state) { document.getElementById('taxFieldState').focus(); return; }
      var payload = {
        county: county,
        state: state,
        assessorUrl: (document.getElementById('taxFieldAssessor').value || '').trim(),
        treasurerUrl: (document.getElementById('taxFieldTreasurer').value || '').trim(),
        knownCostsFees: (document.getElementById('taxFieldCosts').value || '').trim(),
        loginRequired: document.getElementById('taxFieldLogin').checked,
        onlinePortal: document.getElementById('taxFieldPortal').checked,
        notes: (document.getElementById('taxFieldNotes').value || '').trim()
      };
      taxSaveBtn.disabled = true; taxSaveBtn.textContent = 'Saving...';
      var method = editingId ? 'PUT' : 'POST';
      var path = editingId ? '/processing/tax-counties/' + editingId : '/processing/tax-counties';
      apiRequest(method, path, payload)
        .then(function(data) { taxSaveBtn.disabled = false; if (!data.success) { alert(data.error || 'Failed to save.'); return; } closeTaxModal(); runSearch(); })
        .catch(function() { taxSaveBtn.disabled = false; alert('Connection error.'); });
    }

    function deleteTaxCounty(id, name) {
      if (!confirm('Delete "' + name + '" county?')) return;
      apiRequest('DELETE', '/processing/tax-counties/' + id)
        .then(function(data) { if (!data.success) { alert(data.error || 'Failed.'); return; } runSearch(); })
        .catch(function() { alert('Connection error.'); });
    }

    /* ==================== PROCESSING LINKS MODAL ==================== */

    function openLinksModal(record) {
      editingId = record ? record.id : null;
      var meta = TYPE_META[currentType];
      if (record) {
        linksModalTitle.textContent = 'Edit ' + meta.name + ' Link';
        linksSaveBtn.textContent = 'Update Link';
        document.getElementById('linksFieldName').value = record.name || '';
        document.getElementById('linksFieldUrl').value = record.url || '';
        document.getElementById('linksFieldIcon').value = record.icon || 'fa-link';
      } else {
        linksModalTitle.textContent = 'Add ' + meta.name + ' Link';
        linksSaveBtn.textContent = 'Save Link';
        document.getElementById('linksFieldName').value = '';
        document.getElementById('linksFieldUrl').value = '';
        document.getElementById('linksFieldIcon').value = 'fa-link';
      }
      linksModalOverlay.style.display = '';
      document.body.style.overflow = 'hidden';
      setTimeout(function() { document.getElementById('linksFieldName').focus(); }, 100);
    }
    function closeLinksModal() { linksModalOverlay.style.display = 'none'; document.body.style.overflow = ''; editingId = null; }

    function saveLink() {
      var name = (document.getElementById('linksFieldName').value || '').trim();
      var url = (document.getElementById('linksFieldUrl').value || '').trim();
      if (!name) { document.getElementById('linksFieldName').focus(); return; }
      if (!url) { document.getElementById('linksFieldUrl').focus(); return; }
      var payload = {
        name: name,
        url: url,
        icon: (document.getElementById('linksFieldIcon').value || '').trim() || 'fa-link'
      };
      linksSaveBtn.disabled = true; linksSaveBtn.textContent = 'Saving...';
      var method = editingId ? 'PUT' : 'POST';
      var path = editingId ? '/processing/links/' + currentType + '/' + editingId : '/processing/links/' + currentType;
      apiRequest(method, path, payload)
        .then(function(data) { linksSaveBtn.disabled = false; if (!data.success) { alert(data.error || 'Failed to save.'); return; } closeLinksModal(); runSearch(); })
        .catch(function() { linksSaveBtn.disabled = false; alert('Connection error.'); });
    }

    function deleteLink(id, name) {
      if (!confirm('Delete "' + name + '"?')) return;
      apiRequest('DELETE', '/processing/links/' + currentType + '/' + id)
        .then(function(data) { if (!data.success) { alert(data.error || 'Failed.'); return; } runSearch(); })
        .catch(function() { alert('Connection error.'); });
    }
  })();
  </script>
