<!doctype html>
<html lang="en">
<head>
  <script src="js/auth-gate.js?v=20260224-2"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Scanner | MSFG Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />

  <link rel="stylesheet" href="css/variables.css?v=20260302-1" />
  <link rel="stylesheet" href="css/base.css?v=20260302-1" />
  <link rel="stylesheet" href="css/layout.css?v=20260302-1" />
  <link rel="stylesheet" href="css/components.css?v=20260302-1" />
  <link rel="stylesheet" href="css/sections.css?v=20260302-1" />
  <link rel="stylesheet" href="css/scanner.css?v=20260416-1" />
</head>

<body>
  <div class="sc-page">
    <div class="sc-header">
      <div>
        <h1><i class="fas fa-file-invoice"></i> Document Scanner</h1>
        <p class="sc-subtitle">Clean up hard-to-read scans and photos.</p>
      </div>
      <a href="/" class="sc-back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <section>
      <div id="dropzone" class="sc-dropzone" tabindex="0">
        <div>
          <p class="sc-dropzone-primary">Drop an image here, or click to browse</p>
          <p class="sc-dropzone-secondary">JPG or PNG, up to 50 MB</p>
          <input type="file" id="file-input" accept="image/jpeg,image/png" hidden />
        </div>
      </div>
    </section>

    <section class="sc-controls" id="controls" hidden>
      <div class="sc-control-row">
        <label for="preset-select">Preset</label>
        <select id="preset-select">
          <option value="auto" selected>Auto</option>
        </select>
      </div>
    </section>

    <section class="sc-preview" id="preview" hidden>
      <div class="sc-pane">
        <div class="sc-pane-header">
          <h3>Before</h3>
        </div>
        <img id="before-img" alt="Original" />
      </div>
      <div class="sc-pane">
        <div class="sc-pane-header">
          <h3>After</h3>
          <div class="sc-pane-actions">
            <button id="download-btn" class="sc-btn sc-btn-primary" disabled>Download</button>
            <button id="save-btn" class="sc-btn" disabled>Save As&hellip;</button>
            <button id="print-btn" class="sc-btn" disabled>Print</button>
          </div>
        </div>
        <img id="after-img" alt="Cleaned" />
      </div>
    </section>

    <div id="status" class="sc-status">Loading scanner engine&hellip;</div>
  </div>

  <script type="module" src="js/scanner-main.js?v=20260416-1"></script>
</body>
</html>
